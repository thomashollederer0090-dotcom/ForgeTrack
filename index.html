// ── Water ml/bottle preview helper (CHANGE 1) ─────────────
function waterPreviewText(cups) {
  const ml = cups * 250;
  const bottles = cups / 2;
  const bottlesStr = Number.isInteger(bottles) ? `${bottles} bottles` : `${bottles.toFixed(1)} bottles`;
  return `= ${ml}ml · = ${bottlesStr}`;
}

function updateWaterPreview(input, previewId) {
  const cups = parseInt(input.value) || 0;
  const el = document.getElementById(previewId);
  if (el) el.textContent = waterPreviewText(cups);
}

const EXTRA_FIELDS = {
  water:      `<div class="gcf-field"><label>Daily Target (cups)</label><input type="number" class="goal-num" id="gcf-target" min="1" max="30" value="8" oninput="updateWaterPreview(this,'gcf-water-preview')">${hintHTML('waterTarget')}<div class="field-hint" id="gcf-water-preview">${waterPreviewText(8)}</div></div>`,
  steps:      `<div class="gcf-field"><label>Step Goal</label><input type="number" class="goal-num" id="gcf-steps-target" min="100" value="10000">${hintHTML('stepsTarget')}</div>
               <div class="gcf-field"><label>Flights Goal</label><input type="number" class="goal-num" id="gcf-flights-target" min="1" value="10">${hintHTML('flightsTarget')}</div>
               <div class="gcf-field"><label>Weightlifting Goal</label><input type="number" class="goal-num" id="gcf-lifting-target" min="1" value="45">${hintHTML('liftingTarget')}</div>`,
  meditation: `<div class="gcf-field"><label>Daily Target (minutes)</label><input type="number" class="goal-num" id="gcf-target" min="1" value="10">${hintHTML('meditationTarget')}</div>`,
  study:      `<div class="gcf-field"><label>Daily Target (minutes)</label><input type="number" class="goal-num" id="gcf-target" min="1" value="30">${hintHTML('studyTarget')}</div>`,
  custom:     ''
};

function openGoalModal() {
  selectedGoalType = null;
  document.getElementById('goal-config-form').classList.remove('show');
  document.getElementById('gcf-name').value = '';
  document.getElementById('gcf-extra').innerHTML = '';

  // CHANGE 1 — disable goal types that already exist (custom is exempt)
  const existingTypes = new Set(getGoals().map(g => g.type));
  document.querySelectorAll('.goal-type-card').forEach(c => {
    c.classList.remove('selected');
    const type     = c.dataset.type;
    const isAdded  = type !== 'custom' && existingTypes.has(type);
    c.classList.toggle('disabled', isAdded);

    let lbl = c.querySelector('.goal-type-added-label');
    if (isAdded) {
      if (!lbl) {
        lbl = document.createElement('div');
        lbl.className = 'goal-type-added-label';
        lbl.textContent = 'Added';
        c.appendChild(lbl);
      }
    } else if (lbl) {
      lbl.remove();
    }
  });

  document.getElementById('goal-modal').classList.add('open');
}

function closeGoalModal() {
  document.getElementById('goal-modal').classList.remove('open');
}

document.getElementById('add-goal-btn').addEventListener('click', openGoalModal);
document.getElementById('modal-close-btn').addEventListener('click', closeGoalModal);
document.getElementById('gcf-cancel-btn').addEventListener('click', closeGoalModal);

document.getElementById('goal-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('goal-modal')) closeGoalModal();
});

document.querySelectorAll('.goal-type-card').forEach(card => {
  card.addEventListener('click', () => {
    if (card.classList.contains('disabled')) return;
    document.querySelectorAll('.goal-type-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedGoalType = card.dataset.type;
    document.getElementById('gcf-extra').innerHTML = EXTRA_FIELDS[selectedGoalType] || '';
    const nameEl = document.getElementById('gcf-name');
    if (!nameEl.value) nameEl.value = GOAL_TYPES[selectedGoalType].label;
    document.getElementById('goal-config-form').classList.add('show');
  });
});

document.getElementById('gcf-save-btn').addEventListener('click', () => {
  if (!selectedGoalType) return;
  const name = document.getElementById('gcf-name').value.trim();
  if (!name) { document.getElementById('gcf-name').style.borderColor='var(--danger)'; setTimeout(()=>document.getElementById('gcf-name').style.borderColor='',1500); return; }

  const goal = { id: crypto.randomUUID(), type: selectedGoalType, name };

  if (selectedGoalType === 'steps') {
    goal.stepsTarget   = parseInt(document.getElementById('gcf-steps-target')?.value) || 10000;
    goal.flightsTarget = parseInt(document.getElementById('gcf-flights-target')?.value) || 10;
    goal.liftingTarget = parseInt(document.getElementById('gcf-lifting-target')?.value) || 45;
  } else if (selectedGoalType !== 'custom') {
    goal.target = parseInt(document.getElementById('gcf-target')?.value) || 0;
  }

  const goals = getGoals();
  goals.push(goal);
  saveGoals(goals);
  closeGoalModal();
  renderGoals();
});

// ── Streak badge (goal cards) ─────────────────────────────
function buildStreakBadge(goalId) {
  const info   = calcStreakInfo(goalId);
  const streak = info.current;
  if (streak < 1) return '';

  const label = streak === 1 ? '1 day' : `${streak} day streak`;
  const best  = streak >= 7 ? `<div class="streak-badge-best">🏆 Best keep it going!</div>` : '';

  return `
    <div class="streak-badge">
      <span class="streak-badge-flame">🔥</span>
      <div class="streak-badge-content">
        <span class="streak-badge-text">${label}</span>
        ${best}
      </div>
    </div>`;
}

// ── Inline goal config editing (CHANGE 2) ─────────────────
function gefField(id, label, type, value, hintKey) {
  return `<div class="gcf-field">
    <label>${label}</label>
    <input type="${type}" id="${id}" value="${escHtml(String(value === undefined || value === null ? '' : value))}">
    ${hintKey ? hintHTML(hintKey) : ''}
  </div>`;
}

function buildGoalEditFormHTML(goal) {
  let fields = '';

  switch (goal.type) {
    case 'water': {
      const cupsVal = goal.target ?? 8;
      fields = `<div class="gcf-field">
        <label>Target cups</label>
        <input type="number" id="gef-target-${goal.id}" value="${escHtml(String(cupsVal))}" oninput="updateWaterPreview(this,'gef-water-preview-${goal.id}')">

      </div>`;
      break;
    }
    case 'steps': {
      const mt = getMovementTargets(goal);
      fields = gefField(`gef-stepstarget-${goal.id}`, 'Step Goal', 'number', mt.stepsTarget, 'stepsTarget')
             + gefField(`gef-flightstarget-${goal.id}`, 'Flights Goal', 'number', mt.flightsTarget, 'flightsTarget')
             + gefField(`gef-liftingtarget-${goal.id}`, 'Weightlifting Goal', 'number', mt.liftingTarget, 'liftingTarget');
      break;
    }
    case 'meditation':
      fields = gefField(`gef-target-${goal.id}`, 'Target minutes', 'number', goal.target ?? 10, 'meditationTarget');
      break;
    case 'study':
      fields = gefField(`gef-target-${goal.id}`, 'Target minutes', 'number', goal.target ?? 30, 'studyTarget')
             + gefField(`gef-subject-${goal.id}`, 'Subject', 'text', goal.subject ?? '');
      break;
    case 'custom':
      fields = gefField(`gef-name-${goal.id}`, 'Label', 'text', goal.name ?? '')
             + gefField(`gef-desc-${goal.id}`, 'Description', 'text', goal.description ?? '')
             + gefField(`gef-customtarget-${goal.id}`, 'Target value', 'number', goal.customTarget ?? 0)
             + gefField(`gef-unit-${goal.id}`, 'Unit', 'text', goal.unit ?? '');
      break;
  }

  return `
    <div class="goal-edit-form" id="gef-${goal.id}">
      <div class="goal-edit-inner">
        ${fields}
        <div class="goal-edit-actions">
          <button class="btn btn-sm" data-savegoal="${goal.id}">Save</button>
          <button class="btn btn-sm btn-muted" data-cancelgoal="${goal.id}">Cancel</button>
        </div>
      </div>
    </div>`;
}

function toggleGoalEditForm(goalId) {
  const target = document.getElementById(`gef-${goalId}`);
  if (!target) return;
  const willOpen = !target.classList.contains('open');

  // Only one edit form open at a time
  document.querySelectorAll('.goal-edit-form.open').forEach(el => el.classList.remove('open'));

  if (willOpen) target.classList.add('open');
}

function wireGoalEditForm(card, goal) {
  const form = card.querySelector(`#gef-${goal.id}`);
  if (!form) return;

  form.querySelector(`[data-cancelgoal="${goal.id}"]`).addEventListener('click', () => {
    form.classList.remove('open');
  });

  form.querySelector(`[data-savegoal="${goal.id}"]`).addEventListener('click', () => {
    const goals = getGoals();
    const g = goals.find(x => x.id === goal.id);
    if (!g) return;

    switch (g.type) {
      case 'water':
      case 'meditation':
        g.target = parseInt(document.getElementById(`gef-target-${goal.id}`).value) || 0;
        break;
      case 'steps':
        g.stepsTarget   = parseInt(document.getElementById(`gef-stepstarget-${goal.id}`).value) || 10000;
        g.flightsTarget = parseInt(document.getElementById(`gef-flightstarget-${goal.id}`).value) || 10;
        g.liftingTarget = parseInt(document.getElementById(`gef-liftingtarget-${goal.id}`).value) || 45;
        delete g.target;
        break;
      case 'study':
        g.target  = parseInt(document.getElementById(`gef-target-${goal.id}`).value) || 0;
        g.subject = document.getElementById(`gef-subject-${goal.id}`).value.trim();
        break;
      case 'custom':
        g.name         = document.getElementById(`gef-name-${goal.id}`).value.trim() || g.name;
        g.description  = document.getElementById(`gef-desc-${goal.id}`).value.trim();
        g.customTarget = parseInt(document.getElementById(`gef-customtarget-${goal.id}`).value) || 0;
        g.unit         = document.getElementById(`gef-unit-${goal.id}`).value.trim();
        break;
    }

    saveGoals(goals);
    renderGoals();
  });
}

// ── Goal card builders ────────────────────────────────────
function buildGoalCard(goal, todayLog) {
  const val = todayLog[goal.id];
  const complete = isGoalComplete(goal, val);

  const card = document.createElement('div');
  card.className = 'goal-card' + (complete ? ' complete' : '');
  card.dataset.goalId = goal.id;
  card.draggable = true;

  const typeInfo = GOAL_TYPES[goal.type] || { icon: '🎯', label: goal.type };
  const header = `
    <div class="goal-card-header">
      <div class="goal-card-title-wrap">
        <div class="goal-card-title">${typeInfo.icon} ${escHtml(goal.name)}</div>
        <div class="goal-type-badge">${typeInfo.label}</div>
      </div>
      <div class="goal-card-actions">
        <button class="btn-icon" data-editgoal="${goal.id}" title="Edit goal settings">
          ${ICON_EDIT}
        </button>
        <button class="btn-icon danger" data-rmgoal="${goal.id}" title="Delete goal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19,6l-1,14H6L5,6M10,11v6M14,11v6M9,6V4h6v2"/>
          </svg>
        </button>
        <span class="goal-drag-handle" title="Drag to reorder">⠿</span>
      </div>
    </div>`;

  const editForm = buildGoalEditFormHTML(goal);

  let body = '';
  switch (goal.type) {
    case 'water':      body = buildWaterBody(goal, val); break;
    case 'steps':      body = buildStepsBody(goal, val); break;
    case 'meditation':
    case 'study':      body = buildRingBody(goal, val); break;
    case 'custom':     body = buildCustomBody(goal, val); break;
  }

  card.innerHTML = header + editForm + buildStreakBadge(goal.id) + body;

  // Delete goal
  card.querySelector(`[data-rmgoal="${goal.id}"]`).addEventListener('click', () => {
    if (confirm(`Delete goal "${goal.name}"?`)) {
      const goals = getGoals().filter(g => g.id !== goal.id);
      saveGoals(goals);
      renderGoals();
    }
  });

  // Edit goal settings (inline config form)
  card.querySelector(`[data-editgoal="${goal.id}"]`).addEventListener('click', () => {
    toggleGoalEditForm(goal.id);
  });
  wireGoalEditForm(card, goal);

  // Goal-specific event wiring
  wireGoalCard(card, goal, val);

  // Drag and drop
  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', goal.id);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('goal-dragging'), 0);
  });
  card.addEventListener('dragend', () => card.classList.remove('goal-dragging'));
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('goal-drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('goal-drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('goal-drag-over');
    const fromId = e.dataTransfer.getData('text/plain');
    if (fromId && fromId !== goal.id) reorderGoals(fromId, goal.id);
  });

  return card;
}

function pct(cur, target) {
  if (!target) return 0;
  return Math.min(100, Math.round((cur / target) * 100));
}

function progressBarHTML(cur, target, cls='') {
  const p = pct(cur, target);
  const done = p >= 100;
  return `
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill ${done ? 'complete' : ''}" style="width:${p}%"></div>
    </div>
    <div class="progress-lbl">${cur} / ${target} ${cls}</div>`;
}

// WATER
function buildWaterBody(goal, val) {
  const cups   = (val && val.cups) || 0;
  const target = goal.target || 8;

  // Glass geometry (SVG viewBox 32×42):
  //   Outline trapezoid: wider at top (y=4), narrower at bottom (y=39)
  //   Water rect covers bottom ~85% of the interior (y=9 → y=39, height=30)
  //   clipPath hard-constrains the water to the glass shape at the SVG level.
  //   translateY(100%) hides the rect below the clip region; translateY(0) shows it.
  function glassCup(idx, filled) {
    const clipId = `gc-${goal.id}-${idx}`;
    return `<div class="cup ${filled ? 'filled' : ''}" data-cup="${idx}">
      <svg width="32" height="42" viewBox="0 0 32 42" overflow="hidden">
        <defs>
          <clipPath id="${clipId}">
            <polygon points="2,4 30,4 27,39 5,39"/>
          </clipPath>
        </defs>
        <g clip-path="url(#${clipId})">
          <rect class="glass-water-rect ${filled ? 'filled' : ''}"
                x="0" y="9" width="32" height="30"
                fill="rgba(249,115,22,0.8)"/>
        </g>
        <polygon class="glass-poly" points="2,4 30,4 27,39 5,39"/>
      </svg>
    </div>`;
  }

  let cupsHTML = '';
  for (let i = 0; i < target; i++) cupsHTML += glassCup(i, i < cups);

  const ml = cups * 250;
  const bottles = cups / 2;
  const bottlesStr = Number.isInteger(bottles) ? `${bottles} bottles` : `${bottles.toFixed(1)} bottles`;
  const complete = cups >= target;

  return `<div class="cups-row" id="cups-${goal.id}">${cupsHTML}</div>
    <div class="progress-lbl">${cups} / ${target} cups</div>
    <div class="water-info-line">${cups} cups = ${ml}ml</div>
    <div class="water-info-line">${cups} cups = ${bottlesStr}</div>
    ${complete ? '<div class="goal-complete-msg">✓ Goal Complete</div>' : ''}`;
}

// STEPS (Movement)
function movementSectionHTML(icon, label, value, target, unit, idBase) {
  const p = pct(value, target);
  return `
    <div class="movement-section">
      <div class="movement-section-header">
        <span class="movement-section-title">${icon} ${label}</span>
        <span class="movement-section-value" id="${idBase}-lbl">${value} / ${target} ${unit}</span>
      </div>
      <div class="movement-progress-wrap">
        <div class="movement-progress-fill" id="${idBase}-fill" style="width:${p}%"></div>
      </div>
      <input type="number" class="goal-num" id="${idBase}" value="${value}" min="0" placeholder="0">
    </div>`;
}

function buildStepsBody(goal, val) {
  const steps   = (val && val.steps) || 0;
  const flights = (val && val.flights) || 0;
  const lifting = (val && val.liftingMinutes) || 0;
  const mt = getMovementTargets(goal);
  const calories = Math.round(steps * 0.04 + flights * 8 + lifting * 5);
  const allDone = steps >= mt.stepsTarget && flights >= mt.flightsTarget && lifting >= mt.liftingTarget;

  return `
    ${movementSectionHTML('👟', 'Steps', steps, mt.stepsTarget, 'steps', `steps-inp-${goal.id}`)}
    <div class="movement-divider"></div>
    ${movementSectionHTML('🏃', 'Flights Climbed', flights, mt.flightsTarget, 'flights', `flights-inp-${goal.id}`)}
    <div class="movement-divider"></div>
    ${movementSectionHTML('🏋️', 'Weightlifting', lifting, mt.liftingTarget, 'min', `lifting-inp-${goal.id}`)}
    ${allDone ? `<div class="movement-complete-badge">✓ Goal Complete</div>` : ''}
    <div class="cal-est-card">
      <span class="cal-est-label">~ Est. Calories Burned</span>
      <span class="cal-est-value" id="cal-est-${goal.id}">~${calories} kcal</span>
    </div>`;
}

// RING (meditation / study)
function buildRingBody(goal, val) {
  const mins   = (val && val.minutes) || 0;
  const target = goal.target || 10;
  const r = 28, c = 2 * Math.PI * r;
  const offset = c - (Math.min(mins / target, 1) * c);
  const done = mins >= target;
  const color = done ? 'var(--success)' : 'var(--accent)';
  return `
    <div class="ring-wrap">
      <svg class="ring-svg" width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-track" cx="36" cy="36" r="${r}" fill="none" stroke-width="6"/>
        <circle cx="36" cy="36" r="${r}" fill="none" stroke="${color}" stroke-width="6"
          stroke-linecap="round"
          stroke-dasharray="${c.toFixed(2)}"
          stroke-dashoffset="${offset.toFixed(2)}"
          style="transition:stroke-dashoffset 0.4s ease,stroke 0.3s ease"/>
      </svg>
      <div class="ring-center">
        <div class="ring-val" id="ring-val-${goal.id}">${mins}<span style="font-size:12px;color:var(--text-muted)">min</span></div>
        <div class="ring-sub">Goal: ${target} min</div>
        ${done ? '<div style="font-size:11px;color:var(--success);font-weight:600;">✓ Done!</div>' : ''}
      </div>
    </div>
    <div class="add-mins-row" id="mins-btns-${goal.id}">
      <button class="btn btn-sm" data-add="5">+5 min</button>
      <button class="btn btn-sm" data-add="10">+10 min</button>
      <button class="btn btn-sm" data-add="15">+15 min</button>
    </div>
    <div class="add-mins-row" id="mins-rm-btns-${goal.id}">
      <button class="btn btn-sm btn-danger" data-rm="5">−5 min</button>
      <button class="btn btn-sm btn-danger" data-rm="10">−10 min</button>
      <button class="btn btn-sm btn-danger" data-rm="15">−15 min</button>
    </div>`;
}

// CUSTOM
function buildCustomBody(goal, val) {
  const done = val && val.done;
  return `<button class="custom-done-btn ${done?'done':''}" id="custom-btn-${goal.id}">
    ${done ? '✓ Done!' : 'Mark as Done'}
  </button>`;
}

// ── Targeted visual updates (no full re-render, preserves input focus) ──
function updateCardComplete(card, complete) {
  card.classList.toggle('complete', complete);
}

// ── Movement (steps goal type) targeted visual update ─────
function updateMovementVisuals(card, goal, steps, flights, lifting) {
  const mt = getMovementTargets(goal);
  const sections = [
    { idBase: `steps-inp-${goal.id}`,   val: steps,   target: mt.stepsTarget,   unit: 'steps' },
    { idBase: `flights-inp-${goal.id}`, val: flights, target: mt.flightsTarget, unit: 'flights' },
    { idBase: `lifting-inp-${goal.id}`, val: lifting, target: mt.liftingTarget, unit: 'min' }
  ];
  sections.forEach(s => {
    const p = pct(s.val, s.target);
    const fill = card.querySelector(`#${s.idBase}-fill`);
    const lbl  = card.querySelector(`#${s.idBase}-lbl`);
    if (fill) fill.style.width = p + '%';
    if (lbl)  lbl.textContent = `${s.val} / ${s.target} ${s.unit}`;
  });

  const calories = Math.round(steps * 0.04 + flights * 8 + lifting * 5);
  const calEl = card.querySelector(`#cal-est-${goal.id}`);
  if (calEl) calEl.textContent = `~${calories} kcal`;

  const allDone = steps >= mt.stepsTarget && flights >= mt.flightsTarget && lifting >= mt.liftingTarget;
  updateCardComplete(card, allDone);

  let badge = card.querySelector('.movement-complete-badge');
  const calCard = card.querySelector('.cal-est-card');
  if (allDone && !badge) {
    badge = document.createElement('div');
    badge.className = 'movement-complete-badge';
    badge.textContent = '✓ Goal Complete';
    if (calCard) calCard.parentNode.insertBefore(badge, calCard);
  } else if (!allDone && badge) {
    badge.remove();
  }
}

// ── Wire interactive elements ─────────────────────────────
let debounceTimers = {};

function wireGoalCard(card, goal, val) {
  const gid = goal.id;

  if (goal.type === 'water') {
    card.querySelector(`#cups-${gid}`).addEventListener('click', e => {
      const cup = e.target.closest('.cup');
      if (!cup) return;
      const idx    = parseInt(cup.dataset.cup);
      const cur    = (getTodayLog()[gid] || {}).cups || 0;
      const newCups = Math.max(0, (idx < cur) ? idx : idx + 1);
      upsertTodayLog(gid, { cups: newCups });

      // Synchronously kill every SVG filter before the DOM is replaced.
      // This prevents ghost glow on elements that are about to be discarded.
      card.querySelectorAll(`#cups-${gid} svg`).forEach(svg => {
        svg.style.filter = 'none';
      });

      // Re-render on the next tick so the filter-clear above happens
      // in the same JS frame before any new DOM is inserted.
      requestAnimationFrame(() => renderGoals());
    });
  }

  if (goal.type === 'steps') {
    const stepsInp   = card.querySelector(`#steps-inp-${gid}`);
    const flightsInp = card.querySelector(`#flights-inp-${gid}`);
    const liftingInp = card.querySelector(`#lifting-inp-${gid}`);

    const recalc = () => {
      const steps   = parseInt(stepsInp.value) || 0;
      const flights = parseInt(flightsInp.value) || 0;
      const lifting = parseInt(liftingInp.value) || 0;
      upsertTodayLog(gid, { steps, flights, liftingMinutes: lifting });
      updateMovementVisuals(card, goal, steps, flights, lifting);
    };

    [stepsInp, flightsInp, liftingInp].forEach(inp => {
      inp && inp.addEventListener('input', () => {
        clearTimeout(debounceTimers[gid]);
        debounceTimers[gid] = setTimeout(recalc, 500);
      });
    });
  }

  if (goal.type === 'meditation' || goal.type === 'study') {
    card.querySelector(`#mins-btns-${gid}`).addEventListener('click', e => {
      const add = parseInt(e.target.dataset.add);
      if (!add) return;
      const cur = (getTodayLog()[gid] || {}).minutes || 0;
      upsertTodayLog(gid, { minutes: cur + add });
      renderGoals();
    });

    card.querySelector(`#mins-rm-btns-${gid}`).addEventListener('click', e => {
      const rm = parseInt(e.target.dataset.rm);
      if (!rm) return;
      const cur = (getTodayLog()[gid] || {}).minutes || 0;
      upsertTodayLog(gid, { minutes: Math.max(0, cur - rm) });
      renderGoals();
    });
  }

  if (goal.type === 'custom') {
    card.querySelector(`#custom-btn-${gid}`).addEventListener('click', () => {
      const cur = (getTodayLog()[gid] || {}).done;
      upsertTodayLog(gid, { done: !cur });
      renderGoals();
    });
  }
}

// ── Goal reorder ──────────────────────────────────────────
function reorderGoals(fromId, toId) {
  const goals = getGoals();
  const fi = goals.findIndex(g => g.id === fromId);
  const ti = goals.findIndex(g => g.id === toId);
  if (fi === -1 || ti === -1) return;
  const [item] = goals.splice(fi, 1);
  goals.splice(ti, 0, item);
  saveGoals(goals);
  renderGoals();
}

// ── Streak table ──────────────────────────────────────────
function renderStreakOverview() {
  const goals = getGoals();
  const wrap  = document.getElementById('streak-table-wrap');
  const sec   = document.getElementById('streak-section');
  if (goals.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  let rows = goals.map(g => {
    const info = calcStreakInfo(g.id);
    const typeInfo = GOAL_TYPES[g.type] || {};
    return `<tr>
      <td>${typeInfo.icon || ''} ${escHtml(g.name)}</td>
      <td><span class="streak-num">${info.current}</span>${info.current > 0 ? ' 🔥' : ''}</td>
      <td><span class="streak-num">${info.longest}</span></td>
      <td><span class="streak-num">${info.total}</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table class="streak-table">
      <thead><tr><th>Goal</th><th>Current 🔥</th><th>Longest</th><th>Total Days</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Main render ───────────────────────────────────────────
function renderGoals() {
  const goals    = getGoals();
  const todayLog = getTodayLog();
  const list     = document.getElementById('goals-list');
  const dateEl   = document.getElementById('goals-date');

  // Date display
  const today = new Date();
  dateEl.textContent = today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();

  list.innerHTML = '';

  if (goals.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎯</div>
        <h3>NO GOALS YET</h3>
        <p>Tap "+ Add Goal" to start tracking daily habits</p>
      </div>`;
    document.getElementById('streak-section').style.display = 'none';
    return;
  }

  goals.forEach(goal => {
    list.appendChild(buildGoalCard(goal, todayLog));
  });

  renderStreakOverview();
}
