<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>ForgeTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #f97316;
      --accent-glow: 0 0 12px rgba(249,115,22,0.4);
      --accent-bg: rgba(249,115,22,0.15);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #444;
      --danger: #ef4444;
      --success: #22c55e;
      --radius-card: 10px;
      --radius-input: 6px;
      --transition: 0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 88px;
      position: relative;
      z-index: 1;
    }

    /* ── TYPOGRAPHY ── */
    h1, h2, h3, .orbitron { font-family: 'Orbitron', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── VIEWS ── */
    .view { display: none; padding-top: 28px; }
    .view.active { display: block; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0 12px;
      gap: 4px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: none;
      background: none;
      transition: color var(--transition);
    }

    .nav-tab:hover { color: var(--text-secondary); }
    .nav-tab.active { color: var(--accent); }
    .nav-tab svg { width: 22px; height: 22px; }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 16px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .card:hover {
      border-color: rgba(249,115,22,0.4);
      box-shadow: var(--accent-glow);
    }

    /* ── INPUTS ── */
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      width: 100%;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: var(--accent-glow);
    }

    input[type="number"] { font-family: 'JetBrains Mono', monospace; }

    /* ── BUTTONS ── */
    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius-input);
      color: var(--accent);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      transition: background var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .btn:hover { background: var(--accent-bg); box-shadow: var(--accent-glow); }

    .btn-sm { font-size: 12px; padding: 6px 12px; }

    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.12); box-shadow: 0 0 12px rgba(239,68,68,0.3); }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      border-radius: 4px;
      transition: color var(--transition), background var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover { color: var(--accent); background: var(--accent-bg); }
    .btn-icon.danger:hover { color: var(--danger); background: rgba(239,68,68,0.12); }

    /* ── VIEW HEADER ── */
    .view-header { margin-bottom: 24px; }
    .view-header h1 { font-size: 22px; font-weight: 700; letter-spacing: 3px; }
    .view-header h1 span { color: var(--accent); }
    .view-header .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 2px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 14px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .empty-state p { font-size: 13px; color: var(--text-muted); }

    /* ════════════════════════════════════════
       VIEW 1 — WEEKLY PLANNER
    ════════════════════════════════════════ */

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
      position: relative;
    }

    .day-card.has-exercises { border-left: 3px solid var(--accent); }
    .day-card.is-today { border-left: 3px solid #eab308; background: rgba(234,179,8,0.05); }
    .day-card.completed-today { border-left: 3px solid #22c55e; background: rgba(34,197,94,0.05); }

    .today-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: 8px;
      background: rgba(234,179,8,0.15);
      color: #eab308;
      border: 1px solid rgba(234,179,8,0.35);
      vertical-align: middle;
    }

    .today-badge.complete {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border-color: rgba(34,197,94,0.35);
    }

    .day-card-body {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .day-dow {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-primary);
    }

    .day-label-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .day-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .day-card-actions { display: flex; align-items: center; gap: 6px; }

    .label-edit-wrap { display: none; }
    .label-edit-wrap.open { display: flex; align-items: center; gap: 6px; }
    .label-edit-wrap input { width: 130px; font-size: 13px; padding: 5px 9px; }

    /* ════════════════════════════════════════
       VIEW 2 — DAY VIEW
    ════════════════════════════════════════ */

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
      background: none;
      border: none;
      padding: 0;
      font-family: 'Inter', sans-serif;
      transition: opacity var(--transition);
    }

    .back-btn:hover { opacity: 0.75; }

    .day-view-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .day-view-sub { font-size: 13px; color: var(--accent); margin-bottom: 20px; min-height: 18px; }

    /* exercise card in day view */
    .ex-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 10px;
      transition: border-color var(--transition);
    }

    .ex-card.logged-today { border-left: 3px solid #22c55e; background: rgba(34,197,94,0.05); }

    .ex-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .ex-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.3;
    }

    .ex-last {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .ex-last.logged-today-text { color: #22c55e; }

    /* log form */
    .log-form {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .log-form.open { display: block; }

    .log-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .log-field label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .unit-toggle {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .unit-toggle label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .unit-btns {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      overflow: hidden;
      height: 38px;
    }

    .unit-btns button {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      transition: background var(--transition), color var(--transition);
    }

    .unit-btns button.active { background: var(--accent); color: #000; }

    .log-notes { margin-bottom: 10px; }
    .log-notes label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .log-actions { display: flex; gap: 8px; }

    /* session list (day view + history table inline rows) */
    .session-list { margin-top: 4px; }

    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #161616;
    }

    .session-row:last-child { border-bottom: none; }

    .session-row-info { flex: 1; min-width: 0; }

    .session-row-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .session-row-summary {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .session-row-notes {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .session-row-actions { display: flex; gap: 2px; flex-shrink: 0; }

    /* inline delete confirmation */
    .session-confirm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      margin: 6px 0;
      border: 1px solid var(--danger);
      border-radius: var(--radius-input);
      background: rgba(239,68,68,0.08);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .session-confirm-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* inline edit form */
    .session-edit-form {
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      padding: 10px;
      margin: 6px 0;
    }

    /* Add exercise section */
    .add-ex-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .add-ex-section h3 {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .ex-input-wrap { position: relative; }

    .ex-dropdown {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #161616;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-input) var(--radius-input);
      z-index: 50;
      max-height: 200px;
      overflow-y: auto;
    }

    .ex-drop-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: background var(--transition), color var(--transition);
    }

    .ex-drop-item:hover { background: var(--accent-bg); color: var(--accent); }

    .add-ex-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* ════════════════════════════════════════
       VIEW 3 — PROGRESS HUB
    ════════════════════════════════════════ */

    .progress-filter { margin-bottom: 20px; }

    .prog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px 16px;
      margin-bottom: 14px;
      transition: border-color var(--transition);
    }

    .prog-card:hover { border-color: #2a2a2a; }

    .prog-ex-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .day-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

    .day-pill {
      background: var(--accent-bg);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 20px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
    }

    .stats-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }

    .stat { display: flex; flex-direction: column; gap: 3px; }
    .stat-lbl { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-secondary); }

    .journey-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: #0d0d0d;
      border-radius: var(--radius-input);
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    .journey-entry { display: flex; flex-direction: column; gap: 2px; }
    .journey-date { font-size: 11px; color: var(--text-muted); }
    .journey-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-secondary); }
    .journey-arrow { color: var(--accent); font-size: 18px; line-height: 1; }
    .journey-delta { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; }
    .delta-pos { color: var(--success); }
    .delta-neg { color: var(--danger); }
    .delta-neu { color: var(--text-muted); }

    .chart-wrap { position: relative; height: 160px; margin-bottom: 12px; }

    .chart-placeholder {
      background: #0d0d0d;
      border-radius: var(--radius-input);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* history toggle */
    .hist-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      padding: 0;
      transition: color var(--transition);
    }

    .hist-toggle:hover { color: var(--text-secondary); }
    .hist-toggle svg { transition: transform var(--transition); }
    .hist-toggle.open svg { transform: rotate(180deg); }

    .hist-wrap { display: none; margin-top: 12px; }
    .hist-wrap.open { display: block; }

    .hist-table { width: 100%; border-collapse: collapse; font-size: 12px; }

    .hist-table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hist-table td {
      padding: 9px 8px;
      border-bottom: 1px solid #161616;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      vertical-align: middle;
    }

    .hist-table td.notes-cell {
      font-family: 'Inter', sans-serif;
      color: var(--text-muted);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hist-table tr:last-child td { border-bottom: none; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── TOUCH: prevent double-tap zoom delay, keep scrolling ── */
    button, a, [role="button"] { touch-action: manipulation; }

    /* ── SAFE AREA (iPhone notch / Dynamic Island / home bar) ── */
    .app {
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    .bottom-nav {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {

      /* Prevent iOS auto-zoom on input focus (requires font-size >= 16px) */
      input[type="text"],
      input[type="number"],
      textarea,
      select {
        font-size: 16px;
      }

      /* Numbers stay mono at 16px */
      input[type="number"] { font-family: 'JetBrains Mono', monospace; }

      /* Generous touch targets for icon buttons */
      .btn-icon {
        min-width: 44px;
        min-height: 44px;
        padding: 0;
      }

      /* Nav tabs tall enough to tap comfortably */
      .nav-tab { padding: 12px 0 10px; }

      /* ── Day cards: wrap label edit underneath on mobile ── */
      .day-card { flex-wrap: wrap; align-items: flex-start; }
      .day-card-body { order: 1; }
      .day-card-actions { order: 2; align-items: flex-start; padding-top: 2px; }

      .label-edit-wrap.open {
        order: 3;
        width: 100%;
        display: block;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      .label-edit-wrap.open input {
        width: 100%;
        font-size: 16px;
      }

      /* ── Log form: 2-column grid, Weight|Unit side-by-side ── */
      .log-grid {
        grid-template-columns: 1fr 1fr;
      }

      /* Remove the span-2 on mobile so unit sits next to weight */
      .unit-toggle {
        grid-column: auto;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
      }

      .unit-toggle label {
        margin-bottom: 4px;
        white-space: nowrap;
      }

      .unit-btns {
        width: 100%;
        height: 42px;
        flex: 1 0 auto;
      }

      .unit-btns button { font-size: 13px; }

      /* Taller inputs for fat fingers */
      .log-grid input[type="number"] { padding: 11px 10px; }

      /* Log action buttons full-width on small screens */
      .log-actions { flex-direction: row; }
      .log-actions .btn { flex: 1; text-align: center; }

      /* Add exercise button full-width */
      .add-ex-actions .btn { width: 100%; text-align: center; padding: 12px; }

      /* Exercise last-session line: allow wrapping */
      .ex-last { white-space: normal; word-break: break-word; }

      /* History table: horizontal scroll so it never overflows */
      .hist-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .hist-table { min-width: 380px; }

      /* Progress card: tighten spacing */
      .prog-card { padding: 14px 12px; }
      .stats-row { gap: 14px; }

      /* Journey row: stack entries vertically on very small phones */
      .journey-row { padding: 10px 10px; gap: 6px; }
      .journey-val { font-size: 12px; }
    }

    /* Extra-small phones (< 360px) */
    @media (max-width: 360px) {
      .view-header h1 { font-size: 18px; letter-spacing: 2px; }
      .day-dow { font-size: 12px; }
      .prog-ex-name { font-size: 13px; }
      .app { padding-left: 12px; padding-right: 12px; }
    }

    /* ════════════════════════════════════════
       FEATURE 1 — EXERCISE DRAG & DROP
    ════════════════════════════════════════ */
    .ex-card-inner { display: flex; align-items: flex-start; }
    .ex-card-content { flex: 1; min-width: 0; }
    .drag-handle {
      cursor: grab;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
      padding: 2px 8px 0 0;
      display: flex;
      align-items: flex-start;
      padding-top: 14px;
    }
    .drag-handle:active { cursor: grabbing; }
    .ex-card.dragging { opacity: 0.4; border-color: var(--accent); box-shadow: var(--accent-glow); }
    .ex-card.drag-over { border-color: var(--accent); border-style: dashed; }

    /* ════════════════════════════════════════
       FEATURE 2 — PROGRESS FILTER BAR
    ════════════════════════════════════════ */
    .prog-filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .prog-filter-bar input[type="text"] { flex: 1 1 120px; min-width: 0; }
    .prog-filter-bar select { flex: 0 1 auto; }

    /* ════════════════════════════════════════
       FEATURE 3 — UNUSED BADGE / REMOVE
    ════════════════════════════════════════ */
    .prog-card-header { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .unused-badge {
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.35);
      border-radius: 20px;
      color: var(--accent);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 2px 9px;
    }
    .btn-remove-global { font-size: 11px; padding: 5px 10px; }

    /* ════════════════════════════════════════
       FEATURE 4 — GOALS VIEW
    ════════════════════════════════════════ */
    .goals-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    /* Goal card */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .goal-card.complete { border-color: var(--success); box-shadow: 0 0 12px rgba(34,197,94,0.15); }
    .goal-card.goal-dragging { opacity: 0.4; border-color: var(--accent); box-shadow: var(--accent-glow); }
    .goal-card.goal-drag-over { border-color: var(--accent); border-style: dashed; }

    .goal-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }
    .goal-card-title-wrap { flex: 1; }
    .goal-card-title { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .goal-type-badge { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .goal-card-actions { display: flex; align-items: center; gap: 4px; }
    .goal-drag-handle {
      cursor: grab;
      color: var(--text-muted);
      font-size: 16px;
      user-select: none;
      padding: 2px 0 2px 4px;
      line-height: 1;
    }
    .goal-drag-handle:active { cursor: grabbing; }

    /* Streak badge (goal cards) */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a0e00;
      border: 1px solid #92400e;
      border-radius: 8px;
      padding: 6px 12px;
      margin-top: 6px;
      margin-bottom: 10px;
    }
    .streak-badge-flame { font-size: 14px; line-height: 1; }
    .streak-badge-content { display: flex; flex-direction: column; gap: 2px; }
    .streak-badge-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #f97316;
      line-height: 1;
    }
    .streak-badge-best {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      color: #92400e;
      line-height: 1.2;
    }

    /* Water */
    .cups-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }

    /* Cup wrapper — sized to match the SVG */
    .cup {
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
      display: inline-block;
      line-height: 0;
    }
    .cup svg { display: block; }

    /* Glow on the whole SVG when filled */
    .cup.filled svg { filter: drop-shadow(0 0 6px rgba(249,115,22,0.6)); }

    /* Glass outline polygon — CSS drives stroke colour */
    .glass-poly {
      fill: none;
      stroke: #333333;
      stroke-width: 1.5;
      stroke-linejoin: round;
      transition: stroke 0.25s ease;
    }
    .cup.filled .glass-poly { stroke: #f97316; }

    /* Water fill rect — translateY(100%) hides it below the clip region;
       translateY(0) brings it up to show ~85% fill.
       Transition only on transform; nothing else ever moves. */
    .glass-water-rect {
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .glass-water-rect.filled { transform: translateY(0); }

    /* Progress bar */
    .progress-bar-wrap {
      background: #0d0d0d;
      border-radius: 4px;
      height: 7px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-bar-fill.complete { background: var(--success); }
    .progress-lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

    /* Water — ml / bottle info lines */
    .water-info-line { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #555; margin-top: 2px; }

    /* Steps */
    .steps-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .steps-row input { flex: 1; }
    .steps-row .step-unit { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* Movement (steps goal type) */
    .movement-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .movement-row input { flex: 1; }
    .movement-row-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; min-width: 110px; }
    .movement-row + .progress-lbl { margin-bottom: 8px; }

    .movement-section { }
    .movement-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .movement-section-title { font-size: 13px; color: var(--text-primary); }
    .movement-section-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .movement-progress-wrap {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #1e1e1e;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .movement-progress-fill {
      height: 100%;
      background: #f97316;
      border-radius: 3px;
      transition: width 0.3s ease;
      max-width: 100%;
    }
    .movement-section input { width: 100%; }
    .movement-divider { border-top: 1px solid #1e1e1e; margin: 14px 0; }
    .movement-complete-badge {
      font-size: 11px;
      color: var(--success);
      font-weight: 600;
      margin-top: 10px;
      text-align: center;
    }
    .goal-complete-msg {
      font-size: 11px;
      color: var(--success);
      font-weight: 600;
      margin-top: 10px;
      text-align: center;
    }
    .cal-est-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 8px;
    }
    .cal-est-label { font-size: 11px; color: var(--text-muted); }
    .cal-est-value { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }

    /* Ring (meditation / study) */
    .ring-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .ring-svg { transform: rotate(-90deg); flex-shrink: 0; }
    .ring-center { display: flex; flex-direction: column; gap: 3px; }
    .ring-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .ring-sub { font-size: 11px; color: var(--text-muted); }
    .add-mins-row { display: flex; gap: 6px; }
    .add-mins-row button { flex: 1; }
    .add-mins-row + .add-mins-row { margin-top: 6px; }

    /* Custom */
    .custom-done-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      border-radius: var(--radius-input);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all var(--transition);
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: #0d0d0d;
      touch-action: manipulation;
    }
    .custom-done-btn.done { border-color: var(--success); color: var(--success); background: rgba(34,197,94,0.1); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 640px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 22px; line-height: 1;
      padding: 2px 6px;
      touch-action: manipulation;
    }
    .modal-close:hover { color: var(--text-primary); }

    .goal-type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
    .goal-type-card {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color var(--transition), background var(--transition);
      touch-action: manipulation;
    }
    .goal-type-card:hover, .goal-type-card.selected { border-color: var(--accent); background: var(--accent-bg); }
    .goal-type-icon { font-size: 22px; margin-bottom: 5px; }
    .goal-type-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

    .goal-type-card.disabled { opacity: 0.35; cursor: not-allowed; }
    .goal-type-card.disabled:hover { border-color: var(--border); background: #0d0d0d; }
    .goal-type-added-label { font-size: 9px; color: var(--text-muted); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

    .goal-config-form { display: none; border-top: 1px solid var(--border); padding-top: 16px; }
    .goal-config-form.show { display: block; }
    .gcf-field { margin-bottom: 14px; }
    .gcf-field label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .gcf-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .gcf-grid label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; display: block; margin-bottom: 4px; text-transform: uppercase; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; text-align: center; }

    /* shared recommendation hint (Add Goal modal + inline goal config edit) */
    .field-hint { font-size: 11px; color: #555; font-style: italic; margin-top: 4px; }

    /* CHANGE 2: inline goal config edit form */
    .goal-edit-form { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .goal-edit-form.open { max-height: 600px; }
    .goal-edit-inner { padding-top: 4px; padding-bottom: 12px; }
    .goal-edit-actions { display: flex; gap: 8px; margin-top: 4px; }
    .goal-edit-actions .btn { flex: 1; text-align: center; }
    .btn-muted { border-color: var(--border); color: var(--text-muted); }
    .btn-muted:hover { background: rgba(255,255,255,0.04); }

    /* Streak */
    .streak-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
    .streak-section h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; letter-spacing: 2px;
      color: var(--text-muted); margin-bottom: 14px;
    }
    .streak-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .streak-table th {
      text-align: left; color: var(--text-muted); font-weight: 500;
      padding: 6px 8px; border-bottom: 1px solid var(--border);
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    }
    .streak-table td {
      padding: 9px 8px; border-bottom: 1px solid #161616;
      color: var(--text-secondary); vertical-align: middle;
    }
    .streak-table tr:last-child td { border-bottom: none; }
    .streak-num { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent); }

    @media (max-width: 600px) {
      .prog-filter-bar select { flex-basis: calc(50% - 4px); }
      input[type="number"].goal-num { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="app">

<script>
// ════════════════════════════════════════════════════════════
//  DATA LAYER
// ════════════════════════════════════════════════════════════
const DAYS_KEY  = 'forgetrack_days';
const EXES_KEY  = 'forgetrack_exercises';
const DOW_LIST  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function getData() {
  return {
    days:      JSON.parse(localStorage.getItem(DAYS_KEY)  || '[]'),
    exercises: JSON.parse(localStorage.getItem(EXES_KEY) || '[]')
  };
}

function saveData(data) {
  localStorage.setItem(DAYS_KEY,  JSON.stringify(data.days));
  localStorage.setItem(EXES_KEY, JSON.stringify(data.exercises));
}

function initData() {
  const d = getData();
  if (d.days.length === 0) {
    d.days = DOW_LIST.map(dow => ({
      id: crypto.randomUUID(),
      dayOfWeek: dow,
      label: '',
      exerciseIds: []
    }));
    saveData(d);
  }
}

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,day] = iso.split('-');
  return `${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`;
}

function todayISO() {
  return new Date().toISOString().slice(0,10);
}

function todayDOW() {
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
}

function findExById(data, id)    { return data.exercises.find(e => e.id === id); }
function findDayById(data, id)   { return data.days.find(d => d.id === id); }

function findExByName(data, name) {
  const n = name.trim().toLowerCase();
  return data.exercises.find(e => e.name.toLowerCase() === n);
}

function lastSession(ex) {
  if (!ex.sessions || ex.sessions.length === 0) return null;
  return [...ex.sessions].sort((a,b) => a.date > b.date ? -1 : 1)[0];
}

function sortedSessions(ex) {
  return [...(ex.sessions||[])].sort((a,b) => a.date > b.date ? 1 : -1);
}

// ── Backwards-compatible field readers (reps/weight -> firstSetReps/firstSetWeight) ──
function getFirstSetReps(s) {
  return (s.firstSetReps !== undefined && s.firstSetReps !== null) ? s.firstSetReps : s.reps;
}

function getFirstSetWeight(s) {
  return (s.firstSetWeight !== undefined && s.firstSetWeight !== null) ? s.firstSetWeight : s.weight;
}

function sessionSummaryText(s) {
  return `${s.sets} sets · ${getFirstSetReps(s)} reps @ ${getFirstSetWeight(s)}${s.unit} (first set)`;
}

function hasSessionToday(ex) {
  return (ex.sessions||[]).some(s => s.date === todayISO());
}

// ── Inline edit/delete UI state for individual sessions ──
// Maps sessionId -> 'edit' | 'delete'. Never persisted.
const sessionUIState = {};

// Tracks which exercises' "Session History" / "Full History" panels are open. Never persisted.
const dayHistOpen  = new Set();
const progHistOpen = new Set();

const ICON_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
</svg>`;

const ICON_TRASH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
  <polyline points="3,6 5,6 21,6"/>
  <path d="M19,6l-1,14H6L5,6"/>
  <path d="M10,11v6M14,11v6M9,6V4h6v2"/>
</svg>`;

function sessionConfirmHTML() {
  return `
    <div class="session-confirm-row">
      <span>Delete this session?</span>
      <div class="session-confirm-actions">
        <button class="btn btn-sm btn-danger" data-confirm-del type="button">Confirm</button>
        <button class="btn btn-sm" data-cancel-del type="button">Cancel</button>
      </div>
    </div>`;
}

function sessionEditFormHTML(s, idPrefix) {
  const reps   = getFirstSetReps(s);
  const weight = getFirstSetWeight(s);
  const unit   = s.unit || 'kg';
  return `
    <div class="session-edit-form">
      <div class="log-grid">
        <div class="log-field">
          <label>SETS</label>
          <input type="number" id="${idPrefix}-sets" min="1" value="${s.sets}">
        </div>
        <div class="log-field">
          <label>FIRST SET REPS</label>
          <input type="number" id="${idPrefix}-reps" min="1" value="${reps}">
        </div>
        <div class="log-field">
          <label>FIRST SET WEIGHT</label>
          <input type="number" id="${idPrefix}-wt" min="0" step="0.5" value="${weight}">
        </div>
        <div class="unit-toggle">
          <label>UNIT</label>
          <div class="unit-btns" id="${idPrefix}-utg">
            <button class="${unit==='kg'?'active':''}" data-u="kg" type="button">kg</button>
            <button class="${unit==='lbs'?'active':''}" data-u="lbs" type="button">lbs</button>
          </div>
        </div>
      </div>
      <div class="log-notes">
        <label>NOTES <span style="color:var(--text-muted)">(optional)</span></label>
        <input type="text" id="${idPrefix}-notes" value="${escHtml(s.notes||'')}">
      </div>
      <div class="log-actions">
        <button class="btn btn-sm" data-save-session type="button">Save</button>
        <button class="btn btn-sm btn-danger" data-cancel-session type="button">Cancel</button>
      </div>
    </div>`;
}

function wireSessionConfirmRow(root, exId, sessionId, onDone) {
  root.querySelector('[data-confirm-del]').addEventListener('click', () => {
    deleteSession(exId, sessionId);
    delete sessionUIState[sessionId];
    onDone();
  });
  root.querySelector('[data-cancel-del]').addEventListener('click', () => {
    delete sessionUIState[sessionId];
    onDone();
  });
}

function wireSessionEditForm(root, exId, s, idPrefix, onDone) {
  const utg = root.querySelector(`#${idPrefix}-utg`);
  utg.addEventListener('click', e => {
    const u = e.target.dataset.u;
    if (!u) return;
    utg.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.u === u));
  });

  root.querySelector('[data-save-session]').addEventListener('click', () => {
    const sets   = parseInt(document.getElementById(`${idPrefix}-sets`).value);
    const reps   = parseInt(document.getElementById(`${idPrefix}-reps`).value);
    const weight = parseFloat(document.getElementById(`${idPrefix}-wt`).value);
    const notes  = document.getElementById(`${idPrefix}-notes`).value.trim();
    const active = utg.querySelector('.active');
    const unit   = active ? active.dataset.u : 'kg';

    if (!sets || !reps || isNaN(weight)) {
      [['sets',sets],['reps',reps],['wt',weight]].forEach(([f,val]) => {
        if (!val && val !== 0) {
          const el = document.getElementById(`${idPrefix}-${f}`);
          el.style.borderColor = 'var(--danger)';
          setTimeout(() => el.style.borderColor = '', 1500);
        }
      });
      return;
    }

    updateSession(exId, s.id, { sets, firstSetReps: reps, firstSetWeight: weight, unit, notes });
    delete sessionUIState[s.id];
    onDone();
  });

  root.querySelector('[data-cancel-session]').addEventListener('click', () => {
    delete sessionUIState[s.id];
    onDone();
  });
}

function updateSession(exId, sessionId, updates) {
  const data = getData();
  const ex   = findExById(data, exId);
  if (!ex) return;
  const s = (ex.sessions||[]).find(x => x.id === sessionId);
  if (!s) return;
  Object.assign(s, updates);
  delete s.reps;
  delete s.weight;
  saveData(data);
}

// ── Session list rendering for Day View exercise cards ──
function renderSessionListCard(ex, container) {
  container.innerHTML = '';
  const sess = [...(ex.sessions||[])].sort((a,b) => a.date > b.date ? -1 : 1);

  sess.forEach(s => {
    const item  = document.createElement('div');
    const state = sessionUIState[s.id];

    if (state === 'delete') {
      item.innerHTML = sessionConfirmHTML();
      container.appendChild(item);
      wireSessionConfirmRow(item, ex.id, s.id, () => renderDay());
    } else if (state === 'edit') {
      const idPrefix = `de-${ex.id}-${s.id}`;
      item.innerHTML = sessionEditFormHTML(s, idPrefix);
      container.appendChild(item);
      wireSessionEditForm(item, ex.id, s, idPrefix, () => renderDay());
    } else {
      item.className = 'session-row';
      item.innerHTML = `
        <div class="session-row-info">
          <div class="session-row-date">${fmtDate(s.date)}</div>
          <div class="session-row-summary">${escHtml(sessionSummaryText(s))}</div>
          ${s.notes ? `<div class="session-row-notes">${escHtml(s.notes)}</div>` : ''}
        </div>
        <div class="session-row-actions">
          <button class="btn-icon" data-edit-session="${s.id}" title="Edit session">${ICON_EDIT}</button>
          <button class="btn-icon danger" data-del-session="${s.id}" title="Delete session">${ICON_TRASH}</button>
        </div>`;
      container.appendChild(item);
      item.querySelector(`[data-edit-session="${s.id}"]`).addEventListener('click', () => {
        sessionUIState[s.id] = 'edit';
        renderDay();
      });
      item.querySelector(`[data-del-session="${s.id}"]`).addEventListener('click', () => {
        sessionUIState[s.id] = 'delete';
        renderDay();
      });
    }
  });
}

// ════════════════════════════════════════════════════════════
let currentView  = 'week';
let currentDayId = null;

function navigateTo(view, dayId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'instant' });

  currentView = view;

  if (view === 'week') {
    document.getElementById('view-week').classList.add('active');
    document.getElementById('tab-week').classList.add('active');
    renderWeek();

  } else if (view === 'day') {
    currentDayId = dayId;
    document.getElementById('view-day').classList.add('active');
    document.getElementById('tab-today').classList.add('active');
    renderDay();

  } else if (view === 'progress') {
    document.getElementById('view-progress').classList.add('active');
    document.getElementById('tab-progress').classList.add('active');
    renderProgress();

  } else if (view === 'goals') {
    document.getElementById('view-goals').classList.add('active');
    document.getElementById('tab-goals').classList.add('active');
    checkDailyReset();
    renderGoals();
  }
}

function navigateToToday() {
  const data = getData();
  const dow  = todayDOW();
  const day  = data.days.find(d => d.dayOfWeek === dow);
  if (day) navigateTo('day', day.id);
}

// Bottom nav wiring
document.getElementById('tab-week').onclick     = () => navigateTo('week');
document.getElementById('tab-today').onclick    = () => navigateToToday();
document.getElementById('tab-progress').onclick = () => navigateTo('progress');
document.getElementById('tab-goals').onclick    = () => navigateTo('goals');
document.getElementById('back-btn').onclick     = () => navigateTo('week');

// ════════════════════════════════════════════════════════════
//  VIEW 1 — WEEKLY PLANNER
// ════════════════════════════════════════════════════════════
function renderWeek() {
  const data = getData();
  const list = document.getElementById('week-list');
  list.innerHTML = '';

  data.days.forEach(day => {
    const cnt = (day.exerciseIds||[]).length;
    const hasEx = cnt > 0;

    const isToday = day.dayOfWeek === todayDOW();
    const completedToday = isToday && (day.exerciseIds||[]).some(exId => {
      const ex = findExById(data, exId);
      return ex && hasSessionToday(ex);
    });

    const card = document.createElement('div');
    let cls = 'day-card';
    if (hasEx) cls += ' has-exercises';
    if (isToday) cls += ' is-today';
    if (completedToday) cls += ' completed-today';
    card.className = cls;

    card.innerHTML = `
      <div class="day-card-body" data-day-id="${day.id}">
        <div class="day-dow">${day.dayOfWeek.toUpperCase()}${isToday ? `<span class="today-badge${completedToday ? ' complete' : ''}">Today</span>` : ''}</div>
        <div class="day-label-text">${day.label || '<span style="color:var(--text-muted)">—</span>'}</div>
        <div class="day-count">${hasEx ? `${cnt} exercise${cnt!==1?'s':''}` : 'No exercises'}</div>
      </div>
      <div class="day-card-actions">
        <div class="label-edit-wrap" id="lew-${day.id}">
          <input type="text" id="lei-${day.id}" value="${escHtml(day.label)}" placeholder="Label…" style="width:130px;font-size:13px;padding:5px 9px;">
        </div>
        <button class="btn-icon" id="edit-btn-${day.id}" title="Edit label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <svg id="chevron-${day.id}" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" width="14" height="14" style="flex-shrink:0;cursor:pointer;">
          <polyline points="9,18 15,12 9,6"/>
        </svg>
      </div>
    `;

    list.appendChild(card);

    // Navigate on body click
    card.querySelector('.day-card-body').addEventListener('click', () => navigateTo('day', day.id));

    // Navigate on chevron click
    card.querySelector(`#chevron-${day.id}`).addEventListener('click', () => navigateTo('day', day.id));

    // Edit button
    const editBtn = card.querySelector(`#edit-btn-${day.id}`);
    const lew     = card.querySelector(`#lew-${day.id}`);
    const lei     = card.querySelector(`#lei-${day.id}`);

    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = lew.classList.contains('open');
      if (isOpen) {
        saveDayLabel(day.id, lei.value);
      } else {
        lew.classList.add('open');
        lei.focus();
        lei.select();
      }
    });

    lei.addEventListener('keydown', e => {
      if (e.key === 'Enter') { saveDayLabel(day.id, lei.value); lew.classList.remove('open'); }
      if (e.key === 'Escape') { lew.classList.remove('open'); }
    });

    lei.addEventListener('blur', () => {
      // small delay so edit-btn click fires first
      setTimeout(() => {
        if (lew.classList.contains('open')) {
          saveDayLabel(day.id, lei.value);
          lew.classList.remove('open');
        }
      }, 150);
    });
  });
}

function saveDayLabel(dayId, value) {
  const data = getData();
  const day  = findDayById(data, dayId);
  if (day) { day.label = value.trim(); saveData(data); }
  renderWeek();
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════════════════════
//  VIEW 2 — DAY VIEW
// ════════════════════════════════════════════════════════════
function renderDay() {
  const data = getData();
  const day  = findDayById(data, currentDayId);
  if (!day) return;

  document.getElementById('day-view-title').textContent = day.dayOfWeek.toUpperCase();
  document.getElementById('day-view-sub').textContent   = day.label || '';

  const container = document.getElementById('day-ex-list');
  container.innerHTML = '';

  const exIds = day.exerciseIds || [];

  if (exIds.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏋️</div>
        <h3>NO EXERCISES YET</h3>
        <p>Add exercises below to start forging your routine</p>
      </div>`;
  } else {
    exIds.forEach(exId => {
      const ex = findExById(data, exId);
      if (!ex) return;
      container.appendChild(buildExCard(ex, data));
    });
  }

  setupAddExInput(data);
}

function buildExCard(ex, data) {
  const ls   = lastSession(ex);
  const unit = ls ? (ls.unit || 'kg') : 'kg';

  let lastText = 'No sessions logged yet';
  if (ls) {
    lastText = `Last: ${fmtDate(ls.date)} · ${sessionSummaryText(ls)}`;
  }

  const loggedToday = hasSessionToday(ex);

  const card = document.createElement('div');
  card.className = 'ex-card' + (loggedToday ? ' logged-today' : '');
  card.id = `exc-${ex.id}`;
  card.draggable = true;

  card.innerHTML = `
    <div class="ex-card-inner">
      <div class="drag-handle" title="Drag to reorder">⠿</div>
      <div class="ex-card-content">
    <div class="ex-card-header">
      <div class="ex-name">${escHtml(ex.name)}</div>
      <button class="btn-icon danger" data-rm="${ex.id}" title="Remove from this day">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="ex-last${loggedToday ? ' logged-today-text' : ''}">${escHtml(lastText)}</div>
    <div>
      ${loggedToday
        ? `<span style="color:var(--text-muted);font-size:12px;">Already logged today</span>`
        : `<button class="btn btn-sm" data-log="${ex.id}">Log Session</button>`}
      ${(ex.sessions && ex.sessions.length) ? `
      <button class="hist-toggle" id="stbtn-${ex.id}" style="margin-left:10px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="6,9 12,15 18,9"/>
        </svg>
        Session History (${ex.sessions.length})
      </button>` : ''}
    </div>
    <div class="session-list hist-wrap" id="slist-${ex.id}"></div>
    <div class="log-form" id="lf-${ex.id}">
      <div class="log-grid">
        <div class="log-field">
          <label>SETS</label>
          <input type="number" id="lf-sets-${ex.id}" min="1" value="${ls?ls.sets:3}" placeholder="3">
        </div>
        <div class="log-field">
          <label>FIRST SET REPS</label>
          <input type="number" id="lf-reps-${ex.id}" min="1" value="${ls?getFirstSetReps(ls):10}" placeholder="10">
        </div>
        <div class="log-field">
          <label>FIRST SET WEIGHT</label>
          <input type="number" id="lf-wt-${ex.id}" min="0" step="0.5" value="${ls?getFirstSetWeight(ls):''}" placeholder="0">
        </div>
        <div class="unit-toggle">
          <label>UNIT</label>
          <div class="unit-btns" id="utg-${ex.id}">
            <button class="${unit==='kg'?'active':''}" data-u="kg">kg</button>
            <button class="${unit==='lbs'?'active':''}" data-u="lbs">lbs</button>
          </div>
        </div>
      </div>
      <div class="log-notes">
        <label>NOTES <span style="color:var(--text-muted)">(optional)</span></label>
        <input type="text" id="lf-notes-${ex.id}" placeholder="Any notes…">
      </div>
      <div class="log-actions">
        <button class="btn btn-sm" data-save="${ex.id}">Save Session</button>
        <button class="btn btn-sm btn-danger" data-cancel="${ex.id}">Cancel</button>
      </div>
    </div>
      </div><!-- .ex-card-content -->
    </div><!-- .ex-card-inner -->
  `;

  // Drag and drop
  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', ex.id);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    const fromId = e.dataTransfer.getData('text/plain');
    if (fromId && fromId !== ex.id) reorderExercises(currentDayId, fromId, ex.id);
  });

  // Remove button
  card.querySelector(`[data-rm="${ex.id}"]`).addEventListener('click', () => {
    removeExFromDay(ex.id);
  });

  // Log toggle
  const logBtn = card.querySelector(`[data-log="${ex.id}"]`);
  if (logBtn) {
    logBtn.addEventListener('click', () => {
      document.getElementById(`lf-${ex.id}`).classList.toggle('open');
    });
  }

  // Cancel
  card.querySelector(`[data-cancel="${ex.id}"]`).addEventListener('click', () => {
    document.getElementById(`lf-${ex.id}`).classList.remove('open');
  });

  // Unit toggle
  card.querySelector(`#utg-${ex.id}`).addEventListener('click', e => {
    const u = e.target.dataset.u;
    if (!u) return;
    card.querySelectorAll(`#utg-${ex.id} button`).forEach(b => b.classList.toggle('active', b.dataset.u === u));
  });

  // Save session
  card.querySelector(`[data-save="${ex.id}"]`).addEventListener('click', () => saveSession(ex.id));

  // Session history toggle
  const stbtn = card.querySelector(`#stbtn-${ex.id}`);
  const slist = card.querySelector(`#slist-${ex.id}`);
  if (stbtn) {
    if (dayHistOpen.has(ex.id)) {
      slist.classList.add('open');
      stbtn.classList.add('open');
    }
    stbtn.addEventListener('click', () => {
      slist.classList.toggle('open');
      stbtn.classList.toggle('open');
      if (slist.classList.contains('open')) dayHistOpen.add(ex.id);
      else dayHistOpen.delete(ex.id);
    });
  }
  renderSessionListCard(ex, slist);

  return card;
}

function saveSession(exId) {
  const sets   = parseInt(document.getElementById(`lf-sets-${exId}`).value);
  const reps   = parseInt(document.getElementById(`lf-reps-${exId}`).value);
  const weight = parseFloat(document.getElementById(`lf-wt-${exId}`).value);
  const notes  = document.getElementById(`lf-notes-${exId}`).value.trim();
  const active = document.querySelector(`#utg-${exId} .active`);
  const unit   = active ? active.dataset.u : 'kg';

  if (!sets || !reps || isNaN(weight)) {
    // Highlight missing fields visually
    ['sets','reps','wt'].forEach(f => {
      const el = document.getElementById(`lf-${f}-${exId}`);
      const val = parseFloat(el.value);
      if (!val && val !== 0) { el.style.borderColor = 'var(--danger)'; setTimeout(()=>el.style.borderColor='',1500); }
    });
    return;
  }

  const data = getData();
  const ex   = findExById(data, exId);
  if (!ex) return;

  if (!ex.sessions) ex.sessions = [];
  ex.sessions.push({ id: crypto.randomUUID(), date: todayISO(), sets, firstSetReps: reps, firstSetWeight: weight, unit, notes });
  saveData(data);
  renderDay();
}

function removeExFromDay(exId) {
  const data = getData();
  const day  = findDayById(data, currentDayId);
  if (!day) return;

  day.exerciseIds = (day.exerciseIds||[]).filter(id => id !== exId);

  const ex = findExById(data, exId);
  if (ex) ex.dayIds = (ex.dayIds||[]).filter(id => id !== currentDayId);

  saveData(data);
  renderDay();
}

function reorderExercises(dayId, fromExId, toExId) {
  const data = getData();
  const day  = findDayById(data, dayId);
  if (!day) return;
  const ids = day.exerciseIds || [];
  const fi  = ids.indexOf(fromExId);
  const ti  = ids.indexOf(toExId);
  if (fi === -1 || ti === -1) return;
  ids.splice(fi, 1);
  ids.splice(ti, 0, fromExId);
  day.exerciseIds = ids;
  saveData(data);
  renderDay();
}

// ── add exercise input ──
function setupAddExInput() {
  const input    = document.getElementById('add-ex-input');
  const dropdown = document.getElementById('ex-dropdown');
  const addBtn   = document.getElementById('add-ex-btn');

  input.value = '';
  dropdown.style.display = 'none';

  // remove old listeners by replacing element clones
  const newInput  = input.cloneNode(true);
  const newAddBtn = addBtn.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);
  addBtn.parentNode.replaceChild(newAddBtn, addBtn);

  const inp = document.getElementById('add-ex-input');
  const btn = document.getElementById('add-ex-btn');

  inp.addEventListener('input', () => {
    const q = inp.value.trim().toLowerCase();
    dropdown.innerHTML = '';
    if (!q) { dropdown.style.display = 'none'; return; }

    const data    = getData();
    const matches = data.exercises.filter(e => e.name.toLowerCase().includes(q));
    if (matches.length === 0) { dropdown.style.display = 'none'; return; }

    matches.forEach(ex => {
      const item = document.createElement('div');
      item.className = 'ex-drop-item';
      item.textContent = ex.name;
      const selectItem = e => { e.preventDefault(); inp.value = ex.name; dropdown.style.display = 'none'; };
      item.addEventListener('mousedown', selectItem);
      item.addEventListener('touchstart', selectItem, { passive: false });
      dropdown.appendChild(item);
    });
    dropdown.style.display = 'block';
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { dropdown.style.display = 'none'; doAddEx(); }
  });

  inp.addEventListener('blur', () => setTimeout(() => { dropdown.style.display = 'none'; }, 200));

  btn.addEventListener('click', doAddEx);
}

function doAddEx() {
  const inp  = document.getElementById('add-ex-input');
  const name = inp.value.trim();
  if (!name) return;

  const data = getData();
  const day  = findDayById(data, currentDayId);
  if (!day) return;

  let ex = findExByName(data, name);
  if (!ex) {
    ex = { id: crypto.randomUUID(), name: name, dayIds: [], sessions: [] };
    data.exercises.push(ex);
  }

  if (!ex.dayIds) ex.dayIds = [];
  if (!ex.dayIds.includes(currentDayId)) ex.dayIds.push(currentDayId);

  if (!day.exerciseIds) day.exerciseIds = [];
  if (!day.exerciseIds.includes(ex.id)) day.exerciseIds.push(ex.id);

  saveData(data);
  inp.value = '';
  document.getElementById('ex-dropdown').style.display = 'none';
  renderDay();
}

const charts = {};

function populateDayFilter() {
  const data = getData();
  const sel  = document.getElementById('prog-day-filter');
  const cur  = sel.value;
  // keep first "All Days" option
  while (sel.options.length > 1) sel.remove(1);
  data.days.forEach(d => {
    if ((d.exerciseIds||[]).length > 0) {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.dayOfWeek + (d.label ? ` — ${d.label}` : '');
      sel.appendChild(opt);
    }
  });
  sel.value = cur;
}

function renderProgress() {
  // Destroy old chart instances
  Object.keys(charts).forEach(k => { try { charts[k].destroy(); } catch(_){} delete charts[k]; });

  populateDayFilter();

  const data      = getData();
  const filter    = (document.getElementById('prog-filter').value || '').trim().toLowerCase();
  const sortBy    = document.getElementById('prog-sort').value || 'az';
  const dayFilter = document.getElementById('prog-day-filter').value || '';
  const list      = document.getElementById('prog-list');
  list.innerHTML  = '';

  let exercises = [...data.exercises];

  // Text filter
  if (filter) exercises = exercises.filter(e => e.name.toLowerCase().includes(filter));

  // Day filter
  if (dayFilter) exercises = exercises.filter(e => (e.dayIds||[]).includes(dayFilter));

  // Sort
  exercises.sort((a,b) => {
    if (sortBy === 'az') return a.name.localeCompare(b.name);
    if (sortBy === 'za') return b.name.localeCompare(a.name);
    if (sortBy === 'sessions') return (b.sessions||[]).length - (a.sessions||[]).length;
    if (sortBy === 'recent') {
      const la = lastSession(a), lb = lastSession(b);
      if (!la && !lb) return 0;
      if (!la) return 1; if (!lb) return -1;
      return lb.date.localeCompare(la.date);
    }
    if (sortBy === 'gain') {
      const gainOf = ex => {
        const s = sortedSessions(ex);
        return s.length >= 2 ? getFirstSetWeight(s[s.length-1]) - getFirstSetWeight(s[0]) : -Infinity;
      };
      return gainOf(b) - gainOf(a);
    }
    return 0;
  });

  if (exercises.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h3>NO EXERCISES FOUND</h3>
        <p>${filter ? 'No exercises match your filter' : 'Add exercises in the day view to get started'}</p>
      </div>`;
    return;
  }

  exercises.forEach(ex => {
    const sess  = sortedSessions(ex);
    const first = sess[0];
    const last  = sess[sess.length - 1];

    const dayNames = (ex.dayIds||[]).map(id => {
      const d = findDayById(data, id);
      return d ? d.dayOfWeek : null;
    }).filter(Boolean);

    // Journey HTML
    let journeyHTML = '';
    if (sess.length === 0) {
      journeyHTML = '<span style="color:var(--text-muted);font-size:12px;">No sessions logged yet</span>';
    } else if (sess.length === 1) {
      journeyHTML = `
        <div class="journey-entry">
          <div class="journey-date">${fmtDate(first.date)}</div>
          <div class="journey-val">${first.sets}×${getFirstSetReps(first)} @ ${getFirstSetWeight(first)}${first.unit}</div>
        </div>`;
    } else {
      const delta = getFirstSetWeight(last) - getFirstSetWeight(first);
      const dCls  = delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-neu';
      const dTxt  = delta > 0 ? `+${delta}${last.unit}` : delta < 0 ? `${delta}${last.unit}` : '=';
      journeyHTML = `
        <div class="journey-entry">
          <div class="journey-date">${fmtDate(first.date)}</div>
          <div class="journey-val">${first.sets}×${getFirstSetReps(first)} @ ${getFirstSetWeight(first)}${first.unit}</div>
        </div>
        <div class="journey-arrow">→</div>
        <div class="journey-entry">
          <div class="journey-date">${fmtDate(last.date)}</div>
          <div class="journey-val">${last.sets}×${getFirstSetReps(last)} @ ${getFirstSetWeight(last)}${last.unit}</div>
        </div>
        <div class="journey-delta ${dCls}">${dTxt}</div>`;
    }

    const chartId  = `chart-${ex.id}`;
    const showChart = sess.length >= 2;

    const isUnused = (ex.dayIds||[]).length === 0;

    const card = document.createElement('div');
    card.className = 'prog-card';

    card.innerHTML = `
      <div class="prog-card-header">
        <div class="prog-ex-name" style="margin-bottom:0;">${escHtml(ex.name)}</div>
        ${isUnused ? '<span class="unused-badge">UNUSED</span>' : ''}
      </div>
      <div class="day-pills">
        ${dayNames.map(d => `<span class="day-pill">${d}</span>`).join('')}
        ${dayNames.length === 0 ? '<span style="color:var(--text-muted);font-size:12px;">Not assigned to any day</span>' : ''}
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-lbl">Sessions</div>
          <div class="stat-val">${sess.length}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">First logged</div>
          <div class="stat-val">${first ? fmtDate(first.date) : '—'}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Latest</div>
          <div class="stat-val">${last ? fmtDate(last.date) : '—'}</div>
        </div>
      </div>
      <div class="journey-row">${journeyHTML}</div>
      ${showChart
        ? `<div class="chart-wrap"><canvas id="${chartId}"></canvas></div>`
        : `<div class="chart-placeholder">Log more sessions to see your progress chart</div>`}
      <button class="hist-toggle" id="htbtn-${ex.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="6,9 12,15 18,9"/>
        </svg>
        Full History (${sess.length})
      </button>
      ${isUnused ? `<div style="margin-top:10px;"><button class="btn btn-sm btn-danger btn-remove-global" data-rmglobal="${ex.id}">Remove Exercise</button></div>` : ''}
      <div class="hist-wrap" id="hw-${ex.id}">
        <table class="hist-table">
          <thead><tr><th>Date</th><th>Sets</th><th>Reps</th><th>Weight</th><th>Notes</th><th></th></tr></thead>
          <tbody id="hb-${ex.id}"></tbody>
        </table>
      </div>
    `;

    list.appendChild(card);

    // Remove exercise globally (only shown for unused)
    if (isUnused) {
      card.querySelector(`[data-rmglobal="${ex.id}"]`).addEventListener('click', () => {
        removeExerciseGlobal(ex.id, ex.name);
      });
    }

    // Populate history table (newest first)
    const tbody = document.getElementById(`hb-${ex.id}`);
    [...sess].reverse().forEach(s => {
      const state = sessionUIState[s.id];
      const tr = document.createElement('tr');

      if (state === 'delete') {
        tr.innerHTML = `<td colspan="6">${sessionConfirmHTML()}</td>`;
        tbody.appendChild(tr);
        wireSessionConfirmRow(tr, ex.id, s.id, () => renderProgress());
        return;
      }

      if (state === 'edit') {
        const idPrefix = `pe-${ex.id}-${s.id}`;
        tr.innerHTML = `<td colspan="6">${sessionEditFormHTML(s, idPrefix)}</td>`;
        tbody.appendChild(tr);
        wireSessionEditForm(tr, ex.id, s, idPrefix, () => renderProgress());
        return;
      }

      tr.innerHTML = `
        <td>${fmtDate(s.date)}</td>
        <td>${s.sets}</td>
        <td>${getFirstSetReps(s)}</td>
        <td>${getFirstSetWeight(s)}${s.unit}</td>
        <td class="notes-cell">${escHtml(s.notes||'')}</td>
        <td>
          <div class="session-row-actions">
            <button class="btn-icon" title="Edit session" data-edit-session="${s.id}">${ICON_EDIT}</button>
            <button class="btn-icon danger" title="Delete session" data-del-session="${s.id}">${ICON_TRASH}</button>
          </div>
        </td>`;
      tr.querySelector(`[data-edit-session="${s.id}"]`).addEventListener('click', () => {
        sessionUIState[s.id] = 'edit';
        renderProgress();
      });
      tr.querySelector(`[data-del-session="${s.id}"]`).addEventListener('click', () => {
        sessionUIState[s.id] = 'delete';
        renderProgress();
      });
      tbody.appendChild(tr);
    });

    // History toggle
    const htbtn = document.getElementById(`htbtn-${ex.id}`);
    const hw    = document.getElementById(`hw-${ex.id}`);
    if (progHistOpen.has(ex.id)) {
      hw.classList.add('open');
      htbtn.classList.add('open');
    }
    htbtn.addEventListener('click', () => {
      hw.classList.toggle('open');
      htbtn.classList.toggle('open');
      if (hw.classList.contains('open')) progHistOpen.add(ex.id);
      else progHistOpen.delete(ex.id);
    });

    // Render chart
    if (showChart) {
      requestAnimationFrame(() => {
        const canvas = document.getElementById(chartId);
        if (!canvas) return;
        charts[ex.id] = new Chart(canvas.getContext('2d'), {
          type: 'line',
          data: {
            labels: sess.map(s => fmtDate(s.date)),
            datasets: [{
              data: sess.map(s => getFirstSetWeight(s)),
              borderColor: '#f97316',
              backgroundColor: 'rgba(249,115,22,0.08)',
              pointBackgroundColor: '#f97316',
              pointBorderColor: '#f97316',
              pointRadius: 4,
              pointHoverRadius: 6,
              tension: 0.3,
              fill: true,
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#161616',
                borderColor: '#2a2a2a',
                borderWidth: 1,
                titleColor: '#888',
                bodyColor: '#f0f0f0',
                bodyFont: { family: 'JetBrains Mono', size: 12 },
                callbacks: {
                  label: ctx => ` ${ctx.parsed.y} ${sess[ctx.dataIndex]?.unit||'kg'}`
                }
              }
            },
            scales: {
              x: {
                grid: { color: '#1e1e1e' },
                ticks: { color: '#888', font: { size: 10 }, maxRotation: 40, autoSkip: true, maxTicksLimit: 8 }
              },
              y: {
                grid: { color: '#1e1e1e' },
                ticks: { color: '#888', font: { family: 'JetBrains Mono', size: 11 } }
              }
            }
          }
        });
      });
    }
  });
}

function deleteSession(exId, sessionId) {
  const data = getData();
  const ex   = findExById(data, exId);
  if (!ex) return;
  ex.sessions = (ex.sessions||[]).filter(s => s.id !== sessionId);
  saveData(data);
}

function removeExerciseGlobal(exId, exName) {
  if (!confirm(`Remove "${exName}" permanently? All its session history will be deleted. This cannot be undone.`)) return;
  const data = getData();
  // Remove from exercises array
  data.exercises = data.exercises.filter(e => e.id !== exId);
  // Remove from all day exerciseIds just in case
  data.days.forEach(d => { d.exerciseIds = (d.exerciseIds||[]).filter(id => id !== exId); });
  saveData(data);
  renderProgress();
}

const GOALS_KEY     = 'forgetrack_goals';
const GOALS_LOG_KEY = 'forgetrack_goals_log';
const LAST_DATE_KEY = 'forgetrack_last_date';

function getGoals()           { return JSON.parse(localStorage.getItem(GOALS_KEY)     || '[]'); }
function saveGoals(g)         { localStorage.setItem(GOALS_KEY, JSON.stringify(g)); }
function getGoalLogs()        { return JSON.parse(localStorage.getItem(GOALS_LOG_KEY) || '{}'); }
function saveGoalLogs(l)      { localStorage.setItem(GOALS_LOG_KEY, JSON.stringify(l)); }

// Macros goal type has been removed — silently purge any leftover macros
// goals (and their per-day log entries) from localStorage on startup.
function purgeMacrosGoals() {
  const goals = getGoals();
  const macrosIds = new Set(goals.filter(g => g.type === 'macros').map(g => g.id));
  if (macrosIds.size === 0) return;

  saveGoals(goals.filter(g => !macrosIds.has(g.id)));

  const logs = getGoalLogs();
  Object.keys(logs).forEach(date => {
    macrosIds.forEach(id => delete logs[date][id]);
  });
  saveGoalLogs(logs);
}

function getTodayLog() {
  const logs = getGoalLogs();
  return logs[todayISO()] || {};
}

function upsertTodayLog(goalId, value) {
  const logs = getGoalLogs();
  if (!logs[todayISO()]) logs[todayISO()] = {};
  logs[todayISO()][goalId] = value;
  saveGoalLogs(logs);
}

function checkDailyReset() {
  // Additive only — we never wipe old logs. Just ensure today's key exists.
  const today = todayISO();
  localStorage.setItem(LAST_DATE_KEY, today);
  const logs = getGoalLogs();
  if (!logs[today]) { logs[today] = {}; saveGoalLogs(logs); }
}

// ── Movement (steps goal) target helper — backwards compatible ──
function getMovementTargets(goal) {
  return {
    stepsTarget:   goal.stepsTarget   ?? goal.target ?? 10000,
    flightsTarget: goal.flightsTarget ?? 10,
    liftingTarget: goal.liftingTarget ?? 45
  };
}

// ── Streak calculation ────────────────────────────────────
function isGoalComplete(goal, val) {
  if (val === undefined || val === null) return false;
  switch (goal.type) {
    case 'water':      return (val.cups      || 0) >= (goal.target || 8);
    case 'steps': {
      const mt = getMovementTargets(goal);
      return (val.steps          || 0) >= mt.stepsTarget
          && (val.flights        || 0) >= mt.flightsTarget
          && (val.liftingMinutes || 0) >= mt.liftingTarget;
    }
    case 'meditation': return (val.minutes   || 0) >= (goal.target || 10);
    case 'study':      return (val.minutes   || 0) >= (goal.target || 30);
    case 'custom':     return val.done === true;
    default:           return false;
  }
}

function calcStreakInfo(goalId) {
  const logs = getGoalLogs();
  const goal = getGoals().find(g => g.id === goalId);
  if (!goal) return { current: 0, longest: 0, total: 0 };

  const complete = iso => isGoalComplete(goal, (logs[iso] || {})[goalId]);
  const today    = todayISO();

  // Current streak: walk backwards from today
  let current = 0;
  let d = new Date(today + 'T00:00:00');
  while (true) {
    const iso = d.toISOString().slice(0, 10);
    if (complete(iso)) { current++; d.setDate(d.getDate() - 1); }
    else break;
  }

  // Longest streak & total from all logged dates
  const allDates = Object.keys(logs).sort();
  let longest = 0, streak = 0, total = 0;
  if (allDates.length > 0) {
    let cur = new Date(allDates[0] + 'T00:00:00');
    const last = new Date(today + 'T00:00:00');
    while (cur <= last) {
      const iso = cur.toISOString().slice(0, 10);
      if (complete(iso)) { streak++; total++; if (streak > longest) longest = streak; }
      else streak = 0;
      cur.setDate(cur.getDate() + 1);
    }
  }
  return { current, longest, total };
}

let selectedGoalType = null;

const GOAL_TYPES = {

function hintHTML(key) {
